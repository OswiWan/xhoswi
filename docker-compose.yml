services:
  auth-service:
    build: ./services/auth-service
    image: spotifake/auth-service:latest
    container_name: spotifake-auth
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      JWT_SECRET: dev-secret-change-me
    restart: unless-stopped

  catalog-service:
    build: ./services/catalog-service
    image: spotifake/catalog-service:latest
    container_name: spotifake-catalog
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      STREAMING_BASE_URL: http://localhost:3003
    restart: unless-stopped

  streaming-service:
    build: ./services/streaming-service
    image: spotifake/streaming-service:latest
    container_name: spotifake-streaming
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      VIDEOS_DIR: /app/videos
    volumes:
      - ./services/streaming-service/videos:/app/videos:ro
    restart: unless-stopped
