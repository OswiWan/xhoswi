{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: {{ .Values.namespace }}
  annotations:
    # Hooks de Helm: corre después de aplicar los manifiestos (post-install en
    # la primera instalación, post-upgrade en cada helm upgrade).
    # hook-delete-policy: limpia el Job anterior antes de crear el nuevo
    # (los Jobs son inmutables, si no, helm upgrade fallaría).
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.postgres.image }}
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              value: {{ .Values.postgres.password | quote }}
          command:
            - sh
            - -c
            - |
              # Espera a que Postgres acepte conexiones.
              until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "esperando a postgres..."
                sleep 2
              done
              # IF NOT EXISTS → correr N veces es seguro.
              psql -v ON_ERROR_STOP=1 <<'SQL'
                CREATE TABLE IF NOT EXISTS users (
                  email         TEXT PRIMARY KEY,
                  password_hash TEXT NOT NULL,
                  role          TEXT NOT NULL DEFAULT 'user',
                  created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );
                ALTER TABLE users ADD COLUMN IF NOT EXISTS role TEXT NOT NULL DEFAULT 'user';
                CREATE TABLE IF NOT EXISTS videos (
                  id               UUID PRIMARY KEY,
                  title            TEXT NOT NULL,
                  description      TEXT NOT NULL DEFAULT '',
                  thumbnail        TEXT NOT NULL DEFAULT '',
                  hls_path         TEXT NOT NULL,
                  duration_seconds INTEGER NOT NULL DEFAULT 0,
                  created_at       TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );
              SQL
              echo "migración completada"
{{- end }}
