apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: xhoswi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: xhoswi/catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: STREAMING_BASE_URL
              value: "http://localhost:3003"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: xhoswi
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
