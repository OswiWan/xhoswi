apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: xhoswi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: xhoswi/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              value: "dev-secret-change-me"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: xhoswi
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
